<nav
  [ngClass]="menuService.showSideBar ? 'w-80' : 'w-[70px]'"
  class="scrollbar-thumb-rounded scrollbar-track-rounded hidden h-full flex-col justify-between overflow-auto bg-background pt-3 transition-all duration-300 scrollbar-thin scrollbar-track-transparent scrollbar-thumb-card lg:flex">
  <div class="px-4">
    <!-- Logo -->
    <div class="relative h-10">
      <div class="flex items-center" *ngIf="menuService.showSideBar">
        <a (click)="toggleSidebar()">
          <img
            [src]="appSession?.appIcon"
            (error)="onAppIconError($event)"
            class="h-10 w-10 rounded-lg object-contain p-1"
            alt="App icon" />
        </a>
        <div class="ml-1 flex-col pl-2">
          <p>
            <b class="text-sm font-bold text-foreground">
              {{ appSession.app?.appName }}
            </b>
          </p>
          <p class="text-xs text-foreground">
            {{ appSession.app?.appSubText }}
          </p>
        </div>
      </div>
      <button
        (click)="toggleSidebar()"
        class="absolute top-2 right-2 flex h-5 w-5 items-center justify-center rounded text-muted-foreground/50 transition-all duration-200 focus:outline-none hover:text-muted-foreground"
        [ngClass]="{ 'rotate-180': !menuService.showSideBar }">
        <svg-icon src="assets/icons/heroicons/solid/chevron-double-left.svg"> </svg-icon>
      </button>
    </div>

    <!-- Separator -->
    <div class="pt-3">
      <hr class="border-dashed border-muted" />
    </div>

    <!-- Menu Items -->
    <app-sidebar-menu></app-sidebar-menu>

    <div *ngIf="menuService.showSideBar">
      <hr class="border-dashed border-border" />
      <div class="mx-4 my-2">
        <span class="text-xs font-semibold text-foreground">Color</span>
        <div class="mt-2 grid grid-cols-2 gap-2">
          @for (item of themeColors; track $index) {
          <div
            :key="$index"
            (click)="toggleThemeColor(item.name)"
            [ngClass]="{ 'border-muted-foreground bg-card': item.name == themeService.theme().color }"
            class="focus-visible:ring-ring inline-flex h-8 cursor-pointer items-center justify-start whitespace-nowrap rounded-md border border-border bg-background px-3 text-xs font-medium text-muted-foreground shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 disabled:pointer-events-none disabled:opacity-50 hover:bg-card hover:text-foreground dark:text-white">
            <span
              [style.backgroundColor]="item.code"
              class="mr-1 flex h-5 w-5 shrink-0 -translate-x-1 items-center justify-center rounded-full bg-rose-500"></span>
            <p class="capitalize">{{ item.name }}</p>
          </div>
          }
        </div>
      </div>
      <!-- Separator -->
      <div class="pt-3">
        <hr class="border-dashed border-muted" />
      </div>
      <div class="mx-4 my-2">
        <span class="text-xs font-semibold text-foreground">Mode</span>
        <div class="mt-2 grid grid-cols-2 gap-2">
          @for (item of themeMode; track $index) {
          <div
            :key="$index"
            (click)="toggleThemeMode()"
            [ngClass]="{ 'border-muted-foreground bg-card': item == themeService.theme().mode }"
            class="focus-visible:ring-ring inline-flex h-8 cursor-pointer items-center justify-start whitespace-nowrap rounded-md border border-border bg-background px-3 text-xs font-medium text-muted-foreground shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 disabled:pointer-events-none disabled:opacity-50 hover:bg-card hover:text-foreground dark:text-white">
            <svg-icon
              [src]="
                item == 'light' ? 'assets/icons/heroicons/outline/sun.svg' : 'assets/icons/heroicons/outline/moon.svg'
              "
              [svgClass]="'h-5 mr-2 w-5 text-muted-foreground/50 dark:text-white'">
            </svg-icon>
            <p class="capitalize">{{ item }}</p>
          </div>
          }
        </div>
      </div>
    </div>
  </div>

  <div class="mx-4 my-4 space-y-1">
    <!-- Version -->
    <a
      target="_blank"
      href="https://appworldsa.com"
      class="group flex h-9 cursor-pointer items-center justify-start rounded p-2 hover:bg-card">
      <svg-icon
        src="assets/icons/heroicons/outline/information-circle.svg"
        [svgClass]="'h-5 w-5 text-muted-foreground/50'">
      </svg-icon>

      <div class="ml-3 truncate text-[10px] font-semibold tracking-wide focus:outline-none">
        <span class="rounded-lg bg-primary/10 px-2 font-semibold text-primary">v{{ appJson.version }}</span>
      </div>

      <div class="fixed w-full" *ngIf="!menuService.showSideBar">
        <span
          class="z-1 absolute left-12 -top-4 w-auto min-w-max origin-left scale-0 rounded-md bg-foreground p-2 text-xs font-bold text-background shadow-md transition-all duration-200 group-hover:scale-100">
          v{{ appJson.version }}
        </span>
      </div>
    </a>
  </div>
</nav>

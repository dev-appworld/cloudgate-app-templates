<div
  class="h-25 fixed bottom-0 left-0 z-20 w-full border-t border-gray-200 bg-white py-5 pb-10 shadow-2xl dark:border-gray-800 dark:bg-black lg:hidden">
  <div class="font-small mx-auto grid h-full max-w-lg grid-cols-4">
    <button
      (click)="navigate('home')"
      type="button"
      class="group inline-flex flex-col items-center justify-center px-5">
      <svg-icon
        src="assets/icons/other/home-2.svg"
        [svgClass]="'mb-2 h-6 w-6'"
        [ngClass]="router.url === '/home' ? 'text-primary' : 'text-gray-400 dark:text-white'">
      </svg-icon>
    </button>
    <button
      (click)="navigate('explore')"
      type="button"
      class="group inline-flex flex-col items-center justify-center px-5">
      <svg-icon
        src="assets/icons/other/medical.svg"
        [svgClass]="'mb-2 h-6 w-6'"
        [ngClass]="router.url === '/explore' ? 'text-primary' : 'text-gray-400 dark:text-white'">
      </svg-icon>
    </button>
    <button
      (click)="navigate('favourites')"
      type="button"
      class="group inline-flex flex-col items-center justify-center px-5">
      <svg-icon
        src="assets/icons/other/heart.svg"
        [svgClass]="'mb-2 h-6 w-6'"
        [ngClass]="router.url === '/favourites' ? 'text-primary' : 'text-gray-400 dark:text-white'">
      </svg-icon>
    </button>
    <button
      (click)="navigate('profile')"
      type="button"
      class="group inline-flex flex-col items-center justify-center px-5">
      <svg-icon
        src="assets/icons/other/user.svg"
        [svgClass]="'mb-2 h-6 w-6'"
        [ngClass]="router.url === '/profile' ? 'text-primary' : 'text-gray-400 dark:text-white'">
      </svg-icon>
    </button>
  </div>
</div>

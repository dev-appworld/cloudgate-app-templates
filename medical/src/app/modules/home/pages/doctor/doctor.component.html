<div>
  <div
    class="mb-4 flex items-center rounded-box border-[1px] border-solid border-primary bg-white p-2 shadow-md dark:bg-gray-800">
    <img
      class="mr-2 h-24 w-24 rounded-box object-cover shadow-xl"
      src="./assets/images/image-01.jpg"
      alt="image description" />
    <div class="flex-1">
      <div class="w-[200px] flex-col p-2">
        <p class="truncate text-lg font-semibold text-gray-700 dark:text-gray-300">Dr. M.H. Sweedish</p>
        <p class="mb-2 truncate text-sm text-gray-500 dark:text-gray-300">General Practictioner</p>
        <div class="flex items-center text-sm">
          <svg-icon src="assets/icons/heroicons/solid/star.svg" [svgClass]="'h-4 w-4 text-primary'"> </svg-icon>
          <span class="mr-1 text-primary">4.4</span>
          <span class="text-xs text-gray-700 dark:text-gray-400">(328)</span>

          <div class="ml-3 flex items-center">
            <svg-icon src="assets/icons/heroicons/outline/map-pin.svg" [svgClass]="'h-4 w-4 text-gray-700'"> </svg-icon>
            <span class="text-foreground">56 km</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div>
    <div class="mb-1">
      <h1 class="flex-1 text-lg font-bold text-gray-900 dark:text-white">Date</h1>
    </div>
    <form class="mb-5 w-full">
      <div class="relative">
        <div class="start-0 ps-2 pointer-events-none absolute inset-y-0 flex items-center">
          <svg-icon
            src="assets/icons/other/calendar.svg"
            [svgClass]="'h-7 w-7 text-primary bg-gray-200 dark:bg-gray-800 p-1 rounded-full'">
          </svg-icon>
        </div>
        <input
          type="text"
          id="email-address-icon"
          value="Wednesday, June 16, 2024 | 11:00 AM"
          readonly="readonly"
          class="ps-10 block w-full rounded-lg border border-gray-400 p-2.5 text-sm font-bold text-gray-900 focus:border-primary focus:ring-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
          placeholder="Search practice" />
      </div>
    </form>
  </div>
  <hr class="mb-3" />
  <div>
    <div class="mb-1">
      <h1 class="flex-1 text-lg font-bold text-gray-900 dark:text-white">Reason</h1>
    </div>
    <form class="mb-4 w-full">
      <div class="relative">
        <div class="start-0 ps-2 pointer-events-none absolute inset-y-0 flex items-center">
          <svg-icon
            src="assets/icons/other/form-edit.svg"
            [svgClass]="'h-7 w-7 text-primary bg-gray-200 dark:bg-gray-800 p-1 rounded-full'">
          </svg-icon>
        </div>
        <input
          type="text"
          id="email-address-icon"
          value="Low Blood Pressure"
          readonly="readonly"
          class="ps-10 block w-full rounded-lg border border-gray-400 p-2.5 text-sm font-bold text-gray-900 focus:border-primary focus:ring-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
          placeholder="Search practice" />
      </div>
    </form>
  </div>
  <hr class="mb-3" />
  <div class="mb-3">
    <div class="mb-2">
      <h1 class="flex-1 text-lg font-bold text-gray-900 dark:text-white">Payment Detail</h1>
    </div>
    <div class="mb-1 flex">
      <p class="flex-1 text-sm text-gray-700 dark:text-gray-300">Consultation</p>
      <p class="text-sm font-bold text-gray-700 dark:text-gray-200">$60.00</p>
    </div>
    <div class="mb-1 flex">
      <p class="flex-1 text-sm text-gray-700 dark:text-gray-300">Admin Fee</p>
      <p class="text-sm font-bold text-gray-700 dark:text-gray-200">$2.00</p>
    </div>
    <div class="mb-2 flex">
      <p class="flex-1 text-sm text-gray-700 dark:text-gray-300">Discount</p>
      <p class="text-sm font-bold text-gray-700 dark:text-gray-200">-</p>
    </div>
    <div class="mb-1 flex">
      <p class="text-md flex-1 font-bold text-gray-700 dark:text-gray-300">Total</p>
      <p class="text-md font-bold text-primary">$62.00</p>
    </div>
  </div>
  <hr class="mb-3" />
  <div>
    <div class="mb-1">
      <h1 class="flex-1 text-lg font-bold text-gray-900 dark:text-white">Payment Method</h1>
    </div>
    <form class="mb-5 w-full">
      <div class="relative">
        <div class="start-0 ps-2 pointer-events-none absolute inset-y-0 flex items-center">
          <img class="w-15 mr-2 h-5" src="./assets/images/VISA-logo.png" alt="image description" />
        </div>
        <input
          type="text"
          id="email-address-icon"
          value="**** **** **** 8741"
          readonly="readonly"
          class="block w-full rounded-lg border border-gray-400 p-2.5 text-sm font-bold text-gray-900 focus:border-primary focus:ring-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
          placeholder="Search practice"
          style="padding-inline-start: 4rem" />
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3">
          <p class="flex-1 text-sm font-semibold text-gray-500 dark:text-gray-300">Change</p>
        </div>
      </div>
    </form>
  </div>
  <hr class="mb-2" />
</div>

<div class="absolute bottom-0 left-0 flex w-full bg-gray-900 dark:bg-gray-900">
  <div class="m-6 flex w-full items-center justify-between">
    <h1 class="flex-1 text-3xl font-bold text-white dark:text-white">$62.00</h1>
    <button class="flex items-center rounded-full bg-primary px-5 py-2.5 text-lg font-medium text-white">
      Booking
    </button>
  </div>
</div>

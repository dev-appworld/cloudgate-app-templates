<div class="relative flex-col items-center" (click)="navigate('/home/bid')">
  <div class="mb-1 h-24 w-24">
    <p class="absolute rounded-tl-lg rounded-br-lg bg-primary px-1 text-sm font-semibold text-black opacity-75">
      {{ amount }}
    </p>
    <img class="mb-2 h-24 w-24 rounded-box object-cover shadow-lg" [src]="image" alt="image description" />
  </div>
  <div class="w-24">
    <p class="-mb-1 truncate text-ellipsis text-sm font-semibold text-gray-800 dark:text-white">{{ title }}</p>
    <p class="truncate text-ellipsis text-xs text-blue-500 dark:text-gray-400">{{ handle }}</p>
  </div>
</div>

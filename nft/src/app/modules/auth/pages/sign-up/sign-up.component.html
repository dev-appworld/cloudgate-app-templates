<div class="my-10 space-y-6">
  <div class="text-center">
    <h2 class="mb-1 text-3xl font-semibold text-foreground">Sign Up <span class="text-primary">!</span></h2>
    <p class="text-sm text-muted-foreground">Let's get you started by creating your account</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="space-y-3 text-left">
      <div class="form__group">
        <div class="relative">
          <input
            type="text"
            id="name"
            [ngClass]="{ 'is__invalid-input': submitted && f['name'].errors }"
            class="peer block dark:bg-gray-700"
            placeholder=" "
            formControlName="name" />
          <label
            for="name"
            class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
            Name
          </label>
        </div>
        <div *ngIf="submitted && f['name'].errors" class="is__invalid-error text-sm text-red-600">
          <div *ngIf="f['name'].errors['required']">Required field</div>
        </div>
      </div>

      <div class="form__group">
        <div class="relative">
          <input
            type="text"
            id="surname"
            [ngClass]="{ 'is__invalid-input': submitted && f['surname'].errors }"
            class="peer block dark:bg-gray-700"
            placeholder=" "
            formControlName="surname" />
          <label
            for="surname"
            class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
            Surname
          </label>
        </div>
        <div *ngIf="submitted && f['surname'].errors" class="is__invalid-error text-sm text-red-600">
          <div *ngIf="f['surname'].errors['required']">Required field</div>
        </div>
      </div>

      <div class="form__group">
        <div class="relative">
          <input
            type="text"
            id="email"
            [ngClass]="{ 'is__invalid-input': submitted && f['email'].errors }"
            class="peer block dark:bg-gray-700"
            placeholder=" "
            formControlName="email" />
          <label
            for="email"
            class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
            Email address
          </label>
        </div>
        <div *ngIf="submitted && f['email'].errors" class="is__invalid-error text-sm text-red-600">
          <div *ngIf="f['email'].errors['required']">Required field</div>
          <div *ngIf="f['email'].errors['email']">Email must be an email address valid</div>
        </div>
      </div>

      <div class="form__group">
        <div class="relative">
          <input
            [type]="passwordTextType ? 'text' : 'password'"
            id="password"
            [ngClass]="{ 'is__invalid-input': submitted && f['email'].errors }"
            class="peer block dark:bg-gray-700"
            placeholder=" "
            formControlName="password" />
          <label
            for="password"
            class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
            Password
          </label>
          <span
            class="absolute top-2.5 right-5 cursor-pointer text-muted-foreground"
            (click)="togglePasswordTextType()">
            <svg-icon
              [src]="
                !passwordTextType
                  ? 'assets/icons/heroicons/outline/eye-off.svg'
                  : 'assets/icons/heroicons/outline/eye.svg'
              "
              [svgClass]="'h-5 w-5'">
            </svg-icon>
          </span>
        </div>
        <div *ngIf="submitted && f['password'].errors" class="is__invalid-error text-sm text-red-600">
          <div *ngIf="f['password'].errors['required']">Required field</div>
        </div>
      </div>

      <div class="form__group">
        <div class="relative">
          <input
            [type]="passwordConfirmTextType ? 'text' : 'password'"
            id="passwordConfirm"
            [ngClass]="{ 'is__invalid-input': submitted && f['email'].errors }"
            class="peer block dark:bg-gray-700"
            placeholder=" "
            formControlName="passwordConfirm" />
          <label
            for="passwordConfirm"
            class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
            Password Confirm
          </label>
          <span
            class="absolute top-2.5 right-5 cursor-pointer text-muted-foreground"
            (click)="togglePasswordConfirmTextType()">
            <svg-icon
              [src]="
                !passwordConfirmTextType
                  ? 'assets/icons/heroicons/outline/eye-off.svg'
                  : 'assets/icons/heroicons/outline/eye.svg'
              "
              [svgClass]="'h-5 w-5'">
            </svg-icon>
          </span>
        </div>
        <div *ngIf="submitted && f['passwordConfirm'].errors" class="is__invalid-error text-sm text-red-600">
          <div *ngIf="f['passwordConfirm'].errors['required']">Required field</div>
          <div *ngIf="f['passwordConfirm'].errors['confirmedValidator']">Passwords do not match</div>
        </div>
      </div>
    </div>

    <div class="mt-5 flex items-center justify-between space-x-3">
      <div class="flex items-center gap-1">
        <input
          type="checkbox"
          id="terms"
          [ngClass]="{ 'is__invalid-input': submitted && f['terms'].errors }"
          class="peer block dark:bg-gray-700"
          placeholder=" "
          formControlName="terms" />
        <label for="accept-term" class="ml-2 block text-sm text-muted-foreground"> I Accept the </label>
        <a
          [href]="termsUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="flex items-center justify-center rounded-lg bg-gray-100 px-3 py-1 text-xs font-semibold text-primary focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 active:translate-y-px disabled:pointer-events-none disabled:opacity-50 hover:bg-primary/10 dark:bg-gray-700">
          Terms
        </a>
        <a
          [href]="privacyUrl"
          target="_blank"
          rel="noopener noreferrer"
          class="flex items-center justify-center rounded-lg bg-gray-100 px-3 py-1 text-xs font-semibold text-primary focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 active:translate-y-px disabled:pointer-events-none disabled:opacity-50 hover:bg-primary/10 dark:bg-gray-700">
          Privacy
        </a>
      </div>
    </div>
    <div *ngIf="submitted && f['terms'].errors" class="is__invalid-error text-sm text-red-600">
      <div *ngIf="f['terms'].errors['required']">Please accept terms</div>
    </div>

    <!-- Submit Button -->
    <div class="mt-5">
      <button
        class="flex w-full items-center justify-center rounded-lg bg-primary px-5 py-2 text-sm font-semibold text-primary-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 active:translate-y-px disabled:pointer-events-none disabled:opacity-50 hover:opacity-90"
        [buttonBusy]="saving"
        busyText="Signing in...">
        Sign up
      </button>
    </div>
  </form>

  <!-- Sign-up -->
  <div class="mb-10 flex items-center text-sm text-muted-foreground">
    Already have an Account?
    <app-button routerLink="/auth/sign-in" impact="none" tone="primary" shape="rounded" size="small">
      Sign in
    </app-button>
  </div>
</div>

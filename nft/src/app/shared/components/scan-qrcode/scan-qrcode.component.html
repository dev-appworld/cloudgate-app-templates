<div
  id="qrModal"
  tabindex="-1"
  aria-hidden="true"
  class="fixed top-0 left-0 right-0 z-50 hidden h-[calc(100%-1rem)] max-h-full w-full overflow-y-auto overflow-x-hidden p-4 md:inset-0">
  <div class="relative max-h-full w-full max-w-2xl">
    <div class="relative rounded-box bg-white shadow dark:bg-gray-700">
      <div class="flex items-start justify-evenly rounded-t border-b p-5 dark:border-gray-600">
        <h3 class="ml-8 flex-1 text-center text-xl font-semibold text-gray-900 dark:text-white lg:text-2xl">
          Scan QR Code
        </h3>
        <button
          (click)="hide()"
          type="button"
          class="ml-auto inline-flex h-8 w-8 items-center justify-center rounded-lg bg-transparent text-sm text-gray-400 hover:bg-gray-200 hover:text-gray-900 dark:hover:bg-gray-600 dark:hover:text-white">
          <svg class="h-3 w-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6" />
          </svg>
          <span class="sr-only">Close modal</span>
        </button>
      </div>
      <div class="space-y-6 p-6 dark:text-gray-200">
        <div class="scanner" *ngIf="scan">
          <zxing-scanner [enable]="scan" [formats]="[11]" (scanSuccess)="onScanned($event)"></zxing-scanner>
        </div>
      </div>
      <div
        class="flex items-center justify-around space-x-2 rounded-b border-t border-gray-200 p-6 dark:border-gray-600">
        <button
          (click)="hide()"
          class="rounded-lg border border-gray-200 bg-white px-5 py-2.5 text-sm font-medium text-gray-500 focus:z-10 focus:outline-none focus:ring-4 focus:ring-blue-300 hover:bg-gray-100 hover:text-gray-900 dark:border-gray-500 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600 dark:hover:text-white">
          Close
        </button>
      </div>
    </div>
  </div>
</div>

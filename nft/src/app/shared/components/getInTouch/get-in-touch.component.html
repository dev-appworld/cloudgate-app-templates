<div
  id="getInTouchModal"
  tabindex="-1"
  aria-hidden="true"
  class="fixed top-0 left-0 right-0 z-50 hidden h-[calc(100%-1rem)] max-h-full w-full overflow-y-auto overflow-x-hidden p-4 md:inset-0">
  <div class="relative max-h-full w-full max-w-2xl">
    <div class="relative rounded-box bg-white shadow dark:bg-gray-700">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="flex items-start justify-evenly rounded-t border-b p-5 dark:border-gray-600">
          <h3 class="ml-8 flex-1 text-center text-xl font-semibold text-gray-900 dark:text-white lg:text-2xl">
            Get In Touch
          </h3>
          <button
            (click)="close()"
            type="button"
            class="ml-auto inline-flex h-8 w-8 items-center justify-center rounded-lg bg-transparent text-sm text-gray-400 hover:bg-gray-200 hover:text-gray-900 dark:hover:bg-gray-600 dark:hover:text-white">
            <svg class="h-3 w-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
              <path
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6" />
            </svg>
            <span class="sr-only">Close modal</span>
          </button>
        </div>
        <div class="space-y-6 p-6 dark:text-gray-200">
          <div class="space-y-3 text-left">
            <div class="form__group">
              <div class="relative">
                <div class="form-group">
                  <input
                    type="text"
                    id="name"
                    [ngClass]="{
                      'is__invalid-input': submitted && f['name'].errors
                    }"
                    class="peer block dark:bg-gray-700"
                    formControlName="name"
                    class="form-control"
                    placeholder="Eg: John Doe"
                    style="border-radius: 1rem" />
                  <label
                    for="name"
                    class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
                    Name
                  </label>
                </div>
                <div
                  *ngIf="submitted && f['name'].errors"
                  class="is__invalid-error text-sm text-red-600"
                  style="text-align: left; color: #ed2775">
                  <div *ngIf="f['name'].errors['required']">Required field *</div>
                </div>
              </div>
            </div>

            <div class="form__group">
              <div class="relative">
                <div class="form-group">
                  <input
                    type="text"
                    id="email"
                    [ngClass]="{
                      'is__invalid-input': submitted && f['email'].errors
                    }"
                    class="peer block dark:bg-gray-700"
                    formControlName="email"
                    class="form-control"
                    placeholder="Eg: jane@gmail.com"
                    style="border-radius: 1rem" />
                  <label
                    for="email"
                    class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
                    Email Address
                  </label>
                </div>
                <div
                  *ngIf="submitted && f['email'].errors"
                  class="is__invalid-error text-sm text-red-600"
                  style="text-align: left; color: #ed2775">
                  <div *ngIf="f['email'].errors['required']">Required field</div>
                  <div *ngIf="f['email'].errors['email']">Email must be an email address valid</div>
                </div>
              </div>
            </div>

            <div class="form__group">
              <div class="relative">
                <div class="form-group">
                  <select
                    type="text"
                    id="subject"
                    [ngClass]="{
                      'is__invalid-input': submitted && f['subject'].errors
                    }"
                    class="peer block dark:bg-gray-700"
                    formControlName="subject"
                    class="form-control"
                    style="border-radius: 1rem; color: #6b7280">
                    <option class="text-gray-900" value="" selected>Please select best option...</option>
                    <option class="text-gray-900" *ngFor="let sub of subjects">
                      {{ sub.name }}
                    </option>
                  </select>
                  <label
                    for="subject"
                    class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
                    Subject
                  </label>
                </div>
                <div
                  *ngIf="submitted && f['subject'].errors"
                  class="is__invalid-error text-sm text-red-600"
                  style="text-align: left; color: #ed2775">
                  <div *ngIf="f['subject'].errors['required']">Required field *</div>
                </div>
              </div>
            </div>

            <div class="form__group">
              <div class="relative">
                <div class="form-group">
                  <textarea
                    type="text"
                    id="message"
                    [ngClass]="{
                      'is__invalid-input': submitted && f['message'].errors
                    }"
                    class="peer block dark:bg-gray-700"
                    formControlName="message"
                    class="form-control"
                    placeholder="Please describe why you are interested in any of our service offerings"
                    rows="5"
                    style="border-radius: 1rem"></textarea>
                  <label
                    for="subject"
                    class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
                    Message
                  </label>
                </div>
                <div
                  *ngIf="submitted && f['message'].errors"
                  class="is__invalid-error text-sm text-red-600"
                  style="text-align: left; color: #ed2775">
                  <div *ngIf="f['message'].errors['required']">Required field *</div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div
          class="flex items-center justify-around space-x-2 rounded-b border-t border-gray-200 p-6 dark:border-gray-600">
          <button
            type="button"
            (click)="close()"
            class="rounded-lg border border-gray-200 bg-white px-5 py-2.5 text-sm font-medium text-gray-500 focus:z-10 focus:outline-none focus:ring-4 focus:ring-blue-300 hover:bg-gray-100 hover:text-gray-900 dark:border-gray-500 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600 dark:hover:text-white">
            Cancel
          </button>
          <button
            class="rounded-lg bg-primary px-5 py-2.5 text-center text-sm font-medium text-white"
            [disabled]="saving"
            [buttonBusy]="saving"
            busyText="Sending...">
            Send
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

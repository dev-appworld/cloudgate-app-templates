<div id="slider" class="swipe h-screen">
  <div class="swipe-wrap" style="position: fixed">
    <div class="relative flex h-screen items-center justify-center">
      <slide-content
        heading="Welcome to Cloudgate Wallet"
        [showLogo]="true"
        description="Manage balances, track spending, and keep your cards in one secure mobile wallet."
        svgimage="assets/images/svg/welcome.svg"></slide-content>
      <div class="absolute bottom-16">
        <div class="mb-6 flex items-center justify-center">
          <div class="mx-2 h-5 w-5 rounded-full bg-primary"></div>
          <div class="mx-2 h-3 w-3 rounded-full bg-gray-200"></div>
          <div class="mx-2 h-3 w-3 rounded-full bg-gray-200"></div>
          <div class="mx-2 h-3 w-3 rounded-full bg-gray-200"></div>
        </div>
        <div class="flex">
          <button
            disabled="true"
            class="mx-4 flex w-24 items-center justify-center rounded-lg bg-gray-300 px-5 py-2 text-sm font-semibold text-primary-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 active:translate-y-px disabled:pointer-events-none disabled:opacity-50 hover:opacity-90">
            Prev
          </button>
          <button
            (click)="next()"
            class="mx-4 flex w-24 items-center justify-center rounded-lg bg-primary px-5 py-2 text-sm font-semibold text-primary-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 active:translate-y-px disabled:pointer-events-none disabled:opacity-50 hover:opacity-90">
            Next
          </button>
        </div>
      </div>
    </div>

    <div class="relative flex h-screen items-center justify-center">
      <slide-content
        heading="How it Works"
        description="View balances, track spending, and follow transactions from a single dashboard."
        svgimage="assets/images/svg/hey.svg"></slide-content>
      <div class="absolute bottom-16">
        <div class="mb-6 flex items-center justify-center">
          <div class="mx-2 h-3 w-3 rounded-full bg-gray-200"></div>
          <div class="mx-2 h-5 w-5 rounded-full bg-primary"></div>
          <div class="mx-2 h-3 w-3 rounded-full bg-gray-200"></div>
          <div class="mx-2 h-3 w-3 rounded-full bg-gray-200"></div>
        </div>
        <div class="flex">
          <button
            (click)="prev()"
            class="mx-4 flex w-24 items-center justify-center rounded-lg bg-primary px-5 py-2 text-sm font-semibold text-primary-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 active:translate-y-px disabled:pointer-events-none disabled:opacity-50 hover:opacity-90">
            Prev
          </button>
          <button
            (click)="next()"
            class="mx-4 flex w-24 items-center justify-center rounded-lg bg-primary px-5 py-2 text-sm font-semibold text-primary-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 active:translate-y-px disabled:pointer-events-none disabled:opacity-50 hover:opacity-90">
            Next
          </button>
        </div>
      </div>
    </div>

    <div class="relative flex h-screen items-center justify-center">
      <slide-content
        heading="Scan & Pay"
        description="Use the center scan action for quick payments, transfers, and wallet actions on the go."
        svgimage="assets/images/svg/scan.svg"></slide-content>
      <div class="absolute bottom-16">
        <div class="mb-6 flex items-center justify-center">
          <div class="mx-2 h-3 w-3 rounded-full bg-gray-200"></div>
          <div class="mx-2 h-3 w-3 rounded-full bg-gray-200"></div>
          <div class="mx-2 h-5 w-5 rounded-full bg-primary"></div>
          <div class="mx-2 h-3 w-3 rounded-full bg-gray-200"></div>
        </div>
        <div class="flex">
          <button
            (click)="prev()"
            class="mx-4 flex w-24 items-center justify-center rounded-lg bg-primary px-5 py-2 text-sm font-semibold text-primary-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 active:translate-y-px disabled:pointer-events-none disabled:opacity-50 hover:opacity-90">
            Prev
          </button>
          <button
            (click)="next()"
            class="mx-4 flex w-24 items-center justify-center rounded-lg bg-primary px-5 py-2 text-sm font-semibold text-primary-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 active:translate-y-px disabled:pointer-events-none disabled:opacity-50 hover:opacity-90">
            Next
          </button>
        </div>
      </div>
    </div>

    <div class="relative flex h-screen items-center justify-center">
      <div class="mx-6 flex-col text-center">
        <div class="my-10 space-y-6">
          <div class="text-center">
            <h2 class="mb-1 text-3xl font-semibold text-foreground">You're Ready</h2>
            <p class="text-sm text-muted-foreground">Open your wallet, review stats, and manage your cards.</p>
          </div>

          <div>
            <button
              class="flex w-full items-center justify-center rounded-lg bg-primary px-5 py-2 text-sm font-semibold text-primary-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 active:translate-y-px disabled:pointer-events-none disabled:opacity-50 hover:opacity-90"
              (click)="getStarted()">
              Get Started
            </button>
            <p class="mt-2 text-xs dark:text-gray-200">
              Learn more at
              <button (click)="website()" class="text-blue-500 underline">cloudgate.dev</button>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

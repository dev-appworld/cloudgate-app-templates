<div class="bg-background p-6 pb-8 sm:px-8">
  <div class="mb-6" (click)="navigate('home/transfer')">
    <div class="h-24 w-full rounded-t-xl bg-primary p-4">
      <div class="flex">
        <div class="flex-1">
          <p class="text-[32px] font-bold text-white">$15,826.00</p>
        </div>
        <svg-icon src="./assets/icons/other/nfc.svg" [svgClass]="'text-white h-8 w-8'"> </svg-icon>
      </div>
    </div>
    <div class="-mt-1 flex">
      <div class="relative h-14 flex-1 rounded-b-xl bg-primary">
        <div class="flex">
          <div class="mr-5 flex-1 flex-col px-4">
            <p class="text-xs text-gray-100">Number</p>
            <p class="text-sm font-semibold text-white">**** 8794</p>
          </div>
          <div class="mt-4 flex-col px-4">
            <svg-icon src="assets/icons/other/visa.svg" [svgClass]="'h-14 w-14 text-white -mt-5'"> </svg-icon>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="mb-2">
    <div class="mr-2 flex">
      <h1 class="flex-1 text-xl font-bold text-gray-900 dark:text-white">Recipients</h1>
      <button type="button" class="text-center text-sm font-medium text-gray-700">
        <p class="text-lg text-primary">See all</p>
      </button>
    </div>
  </div>

  <div class="mb-6 overflow-x-auto" style="scrollbar-width: none">
    <div class="carousel">
      <div class="carousel-item gap-4">
        <div>
          <div
            class="flex h-16 w-16 flex-col items-center justify-center rounded-full border-2 border-dashed border-gray-500 py-4 text-gray-500 dark:bg-slate-800 dark:text-white">
            <svg-icon src="./assets/icons/other/plus.svg" [svgClass]="'h-8 w-8'"> </svg-icon>
          </div>
          <p class="mt-1 truncate text-ellipsis text-center text-xs text-foreground">Add New</p>
        </div>

        <app-category-grid-item
          backgroundImage="assets/images/avatar-02.jpg"
          name="Stalone S."></app-category-grid-item>
        <app-category-grid-item backgroundImage="assets/images/avatar-03.jpg" name="Wayne B."></app-category-grid-item>
        <app-category-grid-item
          backgroundImage="assets/images/avatar-04.jpg"
          name="Clarkson J."></app-category-grid-item>
        <app-category-grid-item
          backgroundImage="assets/images/avatar-05.jpg"
          name="Peterson K."></app-category-grid-item>
      </div>
    </div>
  </div>

  <div>
    <div class="mb-1">
      <h1 class="text-md flex-1 font-semibold text-gray-900 dark:text-white">Enter Amount:</h1>
    </div>
    <form class="mb-5 w-full">
      <div class="relative">
        <div class="start-0 ps-2 pointer-events-none absolute inset-y-0 flex items-center">
          <p class="text-3xl font-bold text-primary">$</p>
        </div>
        <input
          type="text"
          id="email-address-icon"
          value="580.00"
          readonly="readonly"
          class="block w-full rounded-lg border border-gray-400 p-5 text-3xl font-bold text-primary focus:border-primary focus:ring-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
          placeholder="Search practice"
          style="padding-inline-start: 2rem" />
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3">
          <p
            class="flex-1 rounded-lg bg-gray-100 p-2 text-sm font-semibold text-gray-500 dark:bg-gray-800 dark:text-gray-300">
            USD >
          </p>
        </div>
      </div>
    </form>
  </div>

  <div>
    <div class="mb-1">
      <h1 class="text-md flex-1 font-semibold text-gray-900 dark:text-white">Add Note</h1>
    </div>
    <form class="mb-4 w-full">
      <div class="relative">
        <div class="start-0 ps-2 pointer-events-none absolute inset-y-0 flex items-center">
          <svg-icon
            src="assets/icons/other/form-edit.svg"
            [svgClass]="'h-7 w-7 text-primary bg-gray-200 dark:bg-gray-800 p-1 rounded-full'">
          </svg-icon>
        </div>
        <input
          type="text"
          id="email-address-icon"
          readonly="readonly"
          class="ps-10 block w-full rounded-lg border border-gray-200 p-5 text-sm font-bold text-gray-900 focus:border-primary focus:ring-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
          placeholder="Notes..." />
      </div>
    </form>
  </div>
</div>

<div class="absolute bottom-0 left-0 flex w-full bg-gray-900 dark:bg-gray-900">
  <div class="m-6 flex w-full items-center justify-between">
    <button
      (click)="navigate('/home')"
      class="flex items-center rounded-xl bg-gray-400 px-5 py-2.5 text-lg font-medium text-gray-900">
      Cancel
    </button>
    <button class="flex items-center rounded-xl bg-primary px-5 py-2.5 text-lg font-medium text-white">Continue</button>
  </div>
</div>

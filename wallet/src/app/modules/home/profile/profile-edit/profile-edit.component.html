<div class="bg-background p-6 pb-8 sm:px-8">
<div class="mb-4 mr-2 flex flex-col gap-1">
  <h1 class="text-xl font-bold text-gray-900 dark:text-white">Profile</h1>
  <p class="text-sm text-gray-600 dark:text-gray-300">Update the details on your IdP account.</p>
</div>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div
    *ngIf="status?.type === 'success'"
    role="alert"
    class="mb-4 rounded-lg border border-emerald-500/40 bg-emerald-500/15 px-4 py-3 text-sm font-medium text-emerald-400">
    {{ status?.message }}
  </div>
  <div
    *ngIf="status?.type === 'error'"
    role="alert"
    class="mb-4 rounded-lg border border-red-500/40 bg-red-500/15 px-4 py-3 text-sm font-medium text-red-400">
    {{ status?.message }}
  </div>

  <div class="space-y-3 text-left">
    <div class="form__group">
      <div class="relative">
        <input
          type="text"
          id="name"
          [ngClass]="{ 'is__invalid-input': submitted && f['name'].errors }"
          class="peer block dark:bg-gray-700"
          placeholder=" "
          formControlName="name" />
        <label
          for="name"
          class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
          First name
        </label>
      </div>
    </div>

    <div class="form__group">
      <div class="relative">
        <input
          type="text"
          id="surname"
          [ngClass]="{ 'is__invalid-input': submitted && f['surname'].errors }"
          class="peer block dark:bg-gray-700"
          placeholder=" "
          formControlName="surname" />
        <label
          for="surname"
          class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
          Last name
        </label>
      </div>
    </div>

    <div class="form__group">
      <div class="relative">
        <input
          type="email"
          id="email"
          [ngClass]="{ 'is__invalid-input': submitted && f['email'].errors }"
          class="peer block dark:bg-gray-700"
          placeholder=" "
          formControlName="email" />
        <label
          for="email"
          class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
          Email
        </label>
      </div>
      <div *ngIf="submitted && f['email'].errors" class="is__invalid-error text-sm text-red-600">
        <div *ngIf="f['email'].errors['email']">Enter a valid email address.</div>
      </div>
    </div>
  </div>

  <div class="mt-5">
    <button
      class="mb-4 flex w-full items-center justify-center rounded-lg !bg-primary px-5 py-2.5 text-sm font-semibold text-white focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 active:translate-y-px disabled:pointer-events-none disabled:opacity-50 hover:opacity-90"
      [buttonBusy]="saving"
      busyText="Saving...">
      Save changes
    </button>
  </div>
</form>
</div>

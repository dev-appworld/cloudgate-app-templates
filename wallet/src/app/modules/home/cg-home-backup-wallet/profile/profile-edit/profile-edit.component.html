<div class="mt-20 bg-background p-6 pb-8 sm:px-8">
  <div class="mb-4 mr-2 flex">
    <h1 class="flex-1 text-xl font-bold text-gray-900 dark:text-white">Update Your Profile</h1>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="space-y-3 text-left">
      <div class="form__group">
        <div class="relative">
          <input
            type="text"
            id="name"
            [ngClass]="{ 'is__invalid-input': submitted && f['name'].errors }"
            class="peer block dark:bg-gray-700"
            placeholder=" "
            formControlName="name" />
          <label
            for="name"
            class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
            Name
          </label>
        </div>
        <div *ngIf="submitted && f['name'].errors" class="is__invalid-error text-sm text-red-600">
          <div *ngIf="f['name'].errors['required']">Required field</div>
        </div>
      </div>

      <div class="form__group">
        <div class="relative">
          <input
            type="text"
            id="surname"
            [ngClass]="{ 'is__invalid-input': submitted && f['surname'].errors }"
            class="peer block dark:bg-gray-700"
            placeholder=" "
            formControlName="surname" />
          <label
            for="surname"
            class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
            Surname
          </label>
        </div>
        <div *ngIf="submitted && f['surname'].errors" class="is__invalid-error text-sm text-red-600">
          <div *ngIf="f['surname'].errors['required']">Required field</div>
        </div>
      </div>

      <div class="form__group">
        <div class="relative">
          <input
            type="text"
            id="email"
            [ngClass]="{ 'is__invalid-input': submitted && f['email'].errors }"
            class="peer block dark:bg-gray-700"
            placeholder=" "
            formControlName="email"
            readonly />
          <label
            for="email"
            class="absolute top-2 left-1 z-10 origin-[0] -translate-y-4 scale-95 transform bg-background px-2 text-sm text-muted-foreground duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 peer-focus:text-primary">
            Username/Email address
          </label>
        </div>
        <div *ngIf="submitted && f['email'].errors" class="is__invalid-error text-sm text-red-600">
          <div *ngIf="f['email'].errors['required']">Required field</div>
          <div *ngIf="f['email'].errors['email']">Email must be an email address valid</div>
        </div>
      </div>
    </div>

    <!-- Submit Button -->
    <div class="mt-5">
      <button
        class="mb-4 flex w-full items-center justify-center rounded-lg bg-primary px-5 py-2 text-sm font-semibold text-primary-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 active:translate-y-px disabled:pointer-events-none disabled:opacity-50 hover:opacity-90"
        [buttonBusy]="saving"
        busyText="Saving...">
        Save Details
      </button>
    </div>
  </form>
  <button
    (click)="deleteAccount()"
    class="flex w-full items-center justify-center rounded-lg bg-error p-4 px-5 py-2 text-sm font-semibold text-primary-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 active:translate-y-px disabled:pointer-events-none disabled:opacity-50 hover:opacity-90">
    Delete Account?
  </button>
</div>

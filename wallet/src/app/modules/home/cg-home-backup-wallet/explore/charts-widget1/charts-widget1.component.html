<div class="mb-4 rounded-box bg-gray-100 dark:bg-gray-800">
  <div class="px-4">
    <ul
      class="-mb-px flex flex-wrap pt-4 text-center text-sm font-medium"
      id="default-styled-tab"
      data-tabs-toggle="#default-styled-tab-content"
      data-tabs-active-classes="bg-gray-900 rounded-box text-white hover:text-white dark:text-white dark:hover:text-white border-transparent dark:border-transparent"
      data-tabs-inactive-classes="dark:border-transparent text-gray-500 hover:text-gray-600 dark:text-gray-400 border-gray-100 hover:border-transparent dark:border-transparent dark:hover:text-gray-300"
      role="tablist">
      <li class="me-2" role="presentation">
        <button
          class="inline-block px-4 py-2"
          id="profile-styled-tab"
          data-tabs-target="#styled-profile"
          type="button"
          role="tab"
          aria-controls="profile"
          aria-selected="false">
          Day
        </button>
      </li>
      <li class="me-2" role="presentation">
        <button
          class="inline-block px-4 py-2"
          id="dashboard-styled-tab"
          data-tabs-target="#styled-dashboard"
          type="button"
          role="tab"
          aria-controls="dashboard"
          aria-selected="false">
          Week
        </button>
      </li>
      <li class="me-2" role="presentation">
        <button
          class="inline-block px-4 py-2"
          id="settings-styled-tab"
          data-tabs-target="#styled-settings"
          type="button"
          role="tab"
          aria-controls="settings"
          aria-selected="false">
          Month
        </button>
      </li>
      <li role="presentation">
        <button
          class="inline-block px-4 py-2"
          id="contacts-styled-tab"
          data-tabs-target="#styled-contacts"
          type="button"
          role="tab"
          aria-controls="contacts"
          aria-selected="false">
          Year
        </button>
      </li>
    </ul>
  </div>
  <div id="default-styled-tab-content">
    <div
      class="hidden rounded-lg bg-gray-50 dark:bg-gray-800"
      id="styled-profile"
      role="tabpanel"
      aria-labelledby="profile-tab"></div>
    <div
      class="hidden rounded-lg bg-gray-50 dark:bg-gray-800"
      id="styled-dashboard"
      role="tabpanel"
      aria-labelledby="dashboard-tab"></div>
    <div
      class="hidden rounded-lg bg-gray-50 dark:bg-gray-800"
      id="styled-settings"
      role="tabpanel"
      aria-labelledby="settings-tab"></div>
    <div
      class="hidden rounded-lg bg-gray-50 dark:bg-gray-800"
      id="styled-contacts"
      role="tabpanel"
      aria-labelledby="contacts-tab"></div>
  </div>

  <div #chartRef id="kt_charts_widget_1_chart" class="h-[200px]">
    <apx-chart
      [series]="chartOptions.series"
      [chart]="chartOptions.chart"
      [xaxis]="chartOptions.xaxis"
      [yaxis]="chartOptions.yaxis"
      [dataLabels]="chartOptions.dataLabels"
      [stroke]="chartOptions.stroke"
      [legend]="chartOptions.legend"
      [fill]="chartOptions.fill"
      [states]="chartOptions.states"
      [tooltip]="chartOptions.tooltip"
      [colors]="chartOptions.colors"
      [markers]="chartOptions.markers"
      [plotOptions]="chartOptions.plotOptions"></apx-chart>
  </div>
  <div class="px-4 pt-2 pb-4">
    <div class="grid grid-cols-2 gap-2">
      <div class="flex items-center rounded-lg bg-gray-100 px-3 py-2 dark:bg-gray-700">
        <div
          class="mr-1 flex h-10 w-10 flex-col items-center justify-center rounded-lg bg-white py-4 text-green-700 shadow-lg dark:bg-gray-900">
          <svg-icon src="./assets/icons/other/money-in.svg" [svgClass]="'h-6 w-6'"> </svg-icon>
        </div>
        <div class="flex-col p-2">
          <p class="truncate text-xs text-gray-500 dark:text-gray-300">Income</p>
          <p class="text-md truncate font-semibold text-gray-700 dark:text-gray-300">$10,784.89</p>
        </div>
      </div>
      <div class="flex items-center rounded-lg bg-gray-100 px-3 py-2 dark:bg-gray-700">
        <div
          class="mr-1 flex h-10 w-10 flex-col items-center justify-center rounded-lg bg-white py-4 text-red-600 shadow-lg dark:bg-gray-900">
          <svg-icon src="./assets/icons/other/money-out.svg" [svgClass]="'h-6 w-6'"> </svg-icon>
        </div>
        <div class="flex-col p-2">
          <p class="truncate text-xs text-gray-500 dark:text-gray-300">Expenses</p>
          <p class="text-md truncate font-semibold text-gray-700 dark:text-gray-300">$10,784.89</p>
        </div>
      </div>
    </div>
  </div>
</div>

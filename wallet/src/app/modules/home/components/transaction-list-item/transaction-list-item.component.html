<div
  class="mb-2 flex items-center rounded-lg bg-gray-100 px-3 py-2 dark:bg-slate-800"
  (click)="navigate('home/transfer')">
  <div
    class="mr-2 flex h-10 w-10 flex-col items-center justify-center rounded-lg bg-white py-4 text-gray-700 shadow-lg dark:bg-gray-900">
    <svg-icon [src]="image" [svgClass]="'h-6 w-6'" [ngClass]="imageCss ? imageCss : ''"> </svg-icon>
  </div>
  <div class="flex-1">
    <div class="w-[200px] flex-col p-2">
      <p class="text-md truncate font-semibold text-gray-700 dark:text-gray-300">{{ name }}</p>
      <p class="truncate text-xs text-gray-500 dark:text-gray-300">{{ date }}</p>
    </div>
  </div>
  <div>
    <p class="truncate text-lg font-semibold text-gray-700 dark:text-gray-300">{{ amount }}</p>
  </div>
</div>

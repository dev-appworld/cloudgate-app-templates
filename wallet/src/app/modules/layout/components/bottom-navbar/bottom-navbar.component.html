<div class="h-25 fixed bottom-0 left-0 right-0 z-20 w-full lg:hidden">
  <div class="font-small mx-auto grid h-full max-w-lg grid-cols-4 rounded-t-3xl bg-black p-5">
    <button
      (click)="navigate('home')"
      type="button"
      class="group mx-1 inline-flex flex-col items-center justify-center rounded-box px-2 pt-3"
      [ngClass]="router.url === '/home' ? 'bg-gray-700' : ''">
      <svg-icon
        src="assets/icons/heroicons/solid/home.svg"
        [svgClass]="'mb-2 h-6 w-6'"
        [ngClass]="router.url === '/home' ? 'text-primary' : 'text-white'">
      </svg-icon>
      <span class="h-1 w-8 rounded-lg" [ngClass]="router.url === '/home' ? 'bg-primary' : 'hidden'"></span>
    </button>
    <button
      (click)="navigate('favourites')"
      type="button"
      class="group mx-1 inline-flex flex-col items-center justify-center rounded-box px-2 pt-3"
      [ngClass]="router.url === '/favourites' ? 'bg-gray-700' : ''">
      <svg-icon
        src="assets/icons/heroicons/solid/heart.svg"
        [svgClass]="'mb-2 h-6 w-6'"
        [ngClass]="router.url === '/favourites' ? 'text-primary' : 'text-white'">
      </svg-icon>
      <span class="h-1 w-8 rounded-lg" [ngClass]="router.url === '/favourites' ? 'bg-primary' : 'hidden'"></span>
    </button>
    <button
      (click)="navigate('explore')"
      type="button"
      class="group mx-1 inline-flex flex-col items-center justify-center rounded-box px-2 pt-3"
      [ngClass]="router.url === '/explore' ? 'bg-gray-700' : ''">
      <svg-icon
        src="assets/icons/heroicons/solid/compass.svg"
        [svgClass]="'mb-2 h-6 w-6'"
        [ngClass]="router.url === '/explore' ? 'text-primary' : 'text-white'">
      </svg-icon>
      <span class="h-1 w-8 rounded-lg" [ngClass]="router.url === '/explore' ? 'bg-primary' : 'hidden'"></span>
    </button>
    <button
      (click)="navigate('profile')"
      type="button"
      class="group mx-1 inline-flex flex-col items-center justify-center rounded-box px-2 pt-3"
      [ngClass]="router.url === '/profile' ? 'bg-gray-700' : ''">
      <svg-icon
        src="assets/icons/heroicons/solid/user.svg"
        [svgClass]="'mb-2 h-6 w-6'"
        [ngClass]="router.url === '/profile' ? 'text-primary' : 'text-white'">
      </svg-icon>
      <span class="h-1 w-8 rounded-lg" [ngClass]="router.url === '/profile' ? 'bg-primary' : 'hidden'"></span>
    </button>
  </div>
</div>
